security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: username
        admin_provider:
            entity:
                class: App\Entity\Admin
                property: username

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        # Admin firewall (session-based)
        admin:
            pattern: ^/admin
            lazy: true
            provider: admin_provider
            form_login:
                login_path: admin_login
                check_path: admin_login
                default_target_path: admin_dashboard
                username_parameter: username
                password_parameter: password
            logout:
                path: admin_logout
                target: admin_login

        # API firewall (JWT stateless)
        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

        # Main firewall (session-based for users)
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_event_index
                username_parameter: username
                password_parameter: password
            logout:
                path: app_logout
                target: app_login
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800

    access_control:
        # Public API auth routes
        - { path: ^/api/auth/(register|login|passkey), roles: PUBLIC_ACCESS }
        # Protected API routes
        - { path: ^/api, roles: ROLE_USER }
        # Admin setup (only in dev — remove in prod)
        - { path: ^/admin/setup, roles: PUBLIC_ACCESS }
        # Admin login public
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        # All other admin routes require ROLE_ADMIN
        - { path: ^/admin, roles: ROLE_ADMIN }
        # Public routes
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/events, roles: PUBLIC_ACCESS }
        - { path: ^/, roles: PUBLIC_ACCESS }
